<!DOCTYPE html>
<!--
  login.html — YS Books
  Paleta visual: Azul noche / Violeta 
  Redirige a index.html al autenticarse correctamente.
-->
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YS Books — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body>

  <!-- ── FONDO SVG ── -->
  <div class="lf-bg" aria-hidden="true">
    <svg viewBox="0 0 1440 810" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="roomBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#050818"/>
          <stop offset="60%"  stop-color="#080c2e"/>
          <stop offset="100%" stop-color="#04060f"/>
        </linearGradient>
        <radialGradient id="luzVioleta" cx="65%" cy="40%" r="35%">
          <stop offset="0%"   stop-color="#3d1a8c" stop-opacity="0.55"/>
          <stop offset="50%"  stop-color="#1a1060" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="luzAzul" cx="20%" cy="55%" r="32%">
          <stop offset="0%"   stop-color="#0d2a6e" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="vineta" cx="50%" cy="50%" r="70%">
          <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
        </radialGradient>
        <linearGradient id="estante" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#0d1240"/>
          <stop offset="100%" stop-color="#04060f"/>
        </linearGradient>
      </defs>
      <rect width="1440" height="810" fill="url(#roomBg)"/>
      <!-- Estantes izquierda -->
      <rect x="0" y="542" width="430" height="16" fill="url(#estante)" rx="2"/>
      <rect x="0" y="402" width="385" height="14" fill="url(#estante)" rx="2"/>
      <!-- Libros fila inferior izq -->
      <rect x="10"  y="480" width="48" height="62" fill="#0a0e30" rx="2"/>
      <rect x="60"  y="470" width="38" height="72" fill="#111845" rx="2"/>
      <rect x="100" y="478" width="52" height="64" fill="#0d1240" rx="2"/>
      <rect x="154" y="465" width="44" height="77" fill="#1a237e" rx="2"/>
      <rect x="200" y="472" width="36" height="70" fill="#0f1660" rx="2"/>
      <rect x="238" y="468" width="50" height="74" fill="#151c6e" rx="2"/>
      <rect x="290" y="476" width="42" height="66" fill="#283593" rx="2"/>
      <rect x="334" y="462" width="46" height="80" fill="#0a0e30" rx="2"/>
      <rect x="382" y="474" width="38" height="68" fill="#111845" rx="2"/>
      <!-- Libros fila superior izq -->
      <rect x="8"   y="340" width="40" height="62" fill="#080c2e" rx="2"/>
      <rect x="50"  y="330" width="55" height="72" fill="#0d1240" rx="2"/>
      <rect x="107" y="338" width="38" height="64" fill="#1a237e" rx="2"/>
      <rect x="147" y="325" width="46" height="77" fill="#0a0e30" rx="2"/>
      <rect x="195" y="332" width="42" height="70" fill="#283593" rx="2"/>
      <rect x="239" y="328" width="50" height="74" fill="#111845" rx="2"/>
      <!-- Mesa -->
      <rect x="500" y="582" width="700" height="36" fill="#0d1240" rx="3"/>
      <rect x="500" y="616" width="700" height="194" fill="#060918"/>
      <!-- Pila de libros centro -->
      <rect x="492" y="542" width="178" height="28" fill="#0a0e30" rx="3"/>
      <rect x="492" y="514" width="163" height="30" fill="#080c2e" rx="3"/>
      <rect x="492" y="486" width="173" height="30" fill="#111845" rx="3"/>
      <!-- Libro portada clara -->
      <rect x="762" y="320" width="120" height="250" fill="#e8f0ff" rx="3"/>
      <rect x="762" y="320" width="15"  height="250" fill="#a78bfa" rx="2"/>
      <rect x="780" y="338" width="84"  height="5"   fill="#7c3aed" opacity="0.75" rx="1"/>
      <rect x="780" y="350" width="84"  height="5"   fill="#7c3aed" opacity="0.75" rx="1"/>
      <rect x="780" y="395" width="86"  height="78"  fill="#a78bfa" opacity="0.4" rx="2"/>
      <!-- Iluminación -->
      <rect width="1440" height="810" fill="url(#luzVioleta)"/>
      <rect width="1440" height="810" fill="url(#luzAzul)"/>
      <rect width="1440" height="810" fill="url(#vineta)"/>
      <!-- Oscuridad bordes -->
      <rect x="0"    y="0" width="175"  height="810" fill="#000" opacity="0.62"/>
      <rect x="1265" y="0" width="175"  height="810" fill="#000" opacity="0.58"/>
      <rect x="0"    y="0" width="1440" height="115" fill="#000" opacity="0.78"/>
      <!-- Partículas -->
      <circle cx="622" cy="202" r="1.5" fill="#42a5f5" opacity="0.38"/>
      <circle cx="752" cy="222" r="2"   fill="#a78bfa" opacity="0.28"/>
      <circle cx="812" cy="182" r="1.5" fill="#42a5f5" opacity="0.32"/>
      <circle cx="922" cy="192" r="2"   fill="#42a5f5" opacity="0.28"/>
    </svg>
  </div>

  <!-- ── NAVBAR ── -->
  <nav class="lf-navbar">
    <div class="lf-nav-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      YS Books
    </div>
  </nav>

  <!-- ── MODAL LOGIN (glassmorphism) ── -->
  <div class="lf-modal" id="lf-modal">
    <h1 class="lf-title">Iniciar sesión</h1>

    <div id="error-msg" class="error-msg" role="alert"></div>

    <form onsubmit="iniciarSesion(event)">
      <!-- Usuario -->
      <div class="lf-field">
        <input type="text" id="usuario" name="usuario"
               class="lf-input" placeholder="Usuario"
               autocomplete="username" required/>
        <span class="lf-icon">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
      </div>

      <!-- Password -->
      <div class="lf-field">
        <input type="password" id="password" name="password"
               class="lf-input" placeholder="Contraseña"
               autocomplete="current-password" required/>
        <button type="button" class="lf-eye-btn" id="togglePassword" onclick="togglePasswordVisibility()" title="Mostrar/ocultar contraseña">
          <!-- Ojo abierto (visible por defecto, password oculto) -->
          <svg id="eyeOpen" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- Ojo tachado (se muestra cuando password es visible) -->
          <svg id="eyeClosed" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <button type="submit" id="btn-login" class="lf-btn-submit">
        <span>Ingresar</span>
      </button>
    </form>

    <div class="lf-hint">
      <strong>Solo con fines educativos</strong>
      Usuario: <code>admin</code> &nbsp;|&nbsp; Contraseña: <code>libreria2026</code>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
